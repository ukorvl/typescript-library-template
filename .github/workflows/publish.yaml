name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Lint
        uses: ./.github/actions/lint
        with:
          check-commits: false

      - name: Build everything
        uses: ./.github/actions/build

      - name: Test
        uses: ./.github/actions/test
        with:
          upload-coverage: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pack library tarball
        uses: ./.github/actions/pack-lib
        with:
          artifacts-dir: artifacts

      - name: Generate SBOM
        run: |
          npm sbom --prefix lib --sbom-format cyclonedx --sbom-type library > artifacts/library.sbom.cdx.json
        shell: bash

      - name: Attest tarball + SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: artifacts/*.tgz
          sbom-path: artifacts/library.sbom.cdx.json

      - name: Publish to npm
        run: npm publish --prefix lib
        shell: bash
