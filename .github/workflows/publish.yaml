name: Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        uses: actions/checkout@v6

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Lint
        uses: ./.github/actions/lint
        with:
          check-commits: false

      - name: Build everything
        uses: ./.github/actions/build

      - name: Test
        uses: ./.github/actions/test
        with:
          upload-coverage: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare artifacts directory
        run: mkdir -p artifacts
        shell: bash

      - name: Pack library tarball
        run: |
          pnpm -C lib pack --pack-destination ../artifacts
          ls -la artifacts
        shell: bash

      - name: Generate SBOM
        run: |
          npm sbom --prefix lib --sbom-format cyclonedx --sbom-type library > artifacts/library.sbom.cdx.json
        shell: bash

      - name: Attest tarball + SBOM
        uses: actions/attest@v4
        with:
          subject-path: artifacts/*.tgz
          sbom-path: artifacts/library.sbom.cdx.json

      - name: Publish to npm
        run: npm publish --prefix lib --access public
        shell: bash
