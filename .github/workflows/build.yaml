name: Build

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Lint
        uses: ./.github/actions/lint
        with:
          check-commits: ${{ github.event_name == 'pull_request' }}

      - name: Build everything
        uses: ./.github/actions/build

      - name: Pack library artifact
        run: |
          mkdir -p artifacts
          pnpm -C lib pack --pack-destination ../artifacts
          ls -la artifacts
        shell: bash

      - name: Upload and attest package artifacts
        uses: ./.github/actions/attest-build-artifacts
        with:
          artifact-name: lib-package
          subject-path: |
            artifacts/*.tgz
          enable-attestation: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}

      - name: Test
        uses: ./.github/actions/test
        with:
          upload-coverage: ${{ github.event_name == 'push' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  typescript-readiness:
    name: TypeScript Readiness (${{ matrix.typescript-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        typescript-version:
          - latest
          - rc
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && 0 || 1 }}

      - name: Install dependencies
        uses: ./.github/actions/install

      - name: Typecheck with TypeScript ${{ matrix.typescript-version }}
        run: |
          pnpm --package=typescript@${{ matrix.typescript-version }} dlx tsc --noEmit --project lib/tsconfig.json
          pnpm --package=typescript@${{ matrix.typescript-version }} dlx tsc --noEmit --project docs/tsconfig.json
          pnpm --package=typescript@${{ matrix.typescript-version }} dlx tsc --noEmit --project example/tsconfig.json
        shell: bash
